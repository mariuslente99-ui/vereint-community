  var requiredPhones=Math.max(1,Number(ev.teamSize||1))*Math.max(1,Number(state.qty||1));
  var isTeamEvent=Number(ev.teamSize||1)>1;
  var nameHint=isTeamEvent?'Bitte trage pro Team beide Namen ein – also jeweils Mann und Frau gemeinsam in einer Zeile. Wenn Du mehrere Teams buchst, bitte alle Teams mit jeweils beiden Namen aufführen.':'Bitte trage die Namen aller Ticketinhaber ein.';
  var phoneLabel=requiredPhones>1?'Telefonnummern':'Telefonnummer';
  var phoneHint=requiredPhones>1?'Bitte trage '+requiredPhones+' Telefonnummern ein – eine pro Person, jeweils in eine eigene Zeile.':'Für weitere Kommunikation';
  var phoneField=requiredPhones>1?'<textarea id="phone" name="phone" required autocomplete="tel" placeholder="'+escapeHtml(phoneHint)+'"></textarea><p class="mini-note">'+escapeHtml(phoneHint)+'</p>':'<input id="phone" name="phone" type="tel" required autocomplete="tel" placeholder="Für weitere Kommunikation">';
  el.innerHTML='<form id="ticketForm" novalidate><h2 class="form-title">Ticketdaten</h2><p class="form-note">Im nächsten Schritt wirst Du zu unserem Zahlungsanbieter weitergeleitet.</p><div class="field"><label for="holders">Name(n) Ticketinhaber</label><textarea id="holders" name="ticket_holders" required placeholder="'+escapeHtml(nameHint)+'"></textarea><p class="mini-note">'+escapeHtml(nameHint)+'</p></div><div class="field"><label for="billingName">Rechnungsname</label><input id="billingName" name="billing_name" required autocomplete="name" placeholder="Vorname Nachname"></div><div class="field"><label for="billingAddress">Rechnungsdaten</label><textarea id="billingAddress" name="billing_address" required placeholder="Straße, Hausnummer, PLZ, Ort, Land"></textarea></div><div class="field"><label for="email">Mailadresse</label><input id="email" name="email" type="email" required autocomplete="email" placeholder="name@mail.de"></div><div class="field"><label for="phone">'+phoneLabel+'</label>'+phoneField+'</div><div class="form-error" id="formError">Bitte fülle alle Pflichtfelder vollständig und korrekt aus.</div><div class="payment-note" id="paymentNote">Sichere Zahlung via Stripe. Rechnungs- und Ticketdaten werden für die Zahlungszuordnung vorbereitet.</div><div class="actions"><button class="btn secondary" type="button" id="backToSelection">Zurück</button><button class="btn" type="submit">Zur Bezahlung</button></div></form>';
  document.getElementById('backToSelection').addEventListener('click',function(){state.step=1;render()});
  document.getElementById('ticketForm').addEventListener('submit',function(e){
    e.preventDefault();
    var formEl=e.currentTarget;
    var err=document.getElementById('formError');
    if(!formEl.checkValidity()){if(err)err.classList.add('is-visible');formEl.reportValidity();return}
    if(err)err.classList.remove('is-visible');
    var form=new FormData(formEl);
    var required=['ticket_holders','billing_name','billing_address','email','phone'];
    var missing=required.some(function(k){return !String(form.get(k)||'').trim()});
    var phoneEntries=String(form.get('phone')||'').split(/\n+/).map(function(v){return v.trim()}).filter(Boolean);
    if(missing||phoneEntries.length<requiredPhones){
      if(err){
        err.textContent=phoneEntries.length<requiredPhones?'Bitte trage '+requiredPhones+' Telefonnummern ein – jeweils eine pro Zeile.':'Bitte fülle alle Pflichtfelder vollständig und korrekt aus.';
        err.classList.add('is-visible');
      }
      return;
    }
    var plan=pricePlan(ev,state.qty);
    var payload={eventSlug:ev.slug,eventName:ev.name,eventDate:ev.date,eventTime:ev.time,locationName:ev.locationName,address:ev.address,postalCode:ev.postalCode,city:ev.city,quantity:state.qty,unit:ev.unit,earlyBirdQuantity:plan.early,normalQuantity:plan.normal,earlyBirdUnitPrice:ev.earlyBirdPrice,normalUnitPrice:ev.price,total:plan.total,currency:'eur',ticketHolders:form.get('ticket_holders'),billingName:form.get('billing_name'),billingAddress:form.get('billing_address'),email:form.get('email'),phone:phoneEntries.join('\n'),phoneCount:phoneEntries.length,requiredPhoneCount:requiredPhones,totalTickets:ev.totalTickets,bookedTickets:ev.staticBookedTickets||0,earlyBirdTickets:ev.earlyBirdTickets,earlyBirdBooked:ev.staticEarlyBirdBooked||0,clientReference:buildClientReference({eventSlug:ev.slug,quantity:state.qty})};
    try{sessionStorage.setItem('vereint_pending_checkout',JSON.stringify(payload));}catch(storageErr){}
    var trackName=cleanLabel(ev.plausibleEventName||ev.name);
    track('Checkout Data Submitted: '+trackName,{event_name:trackName,event_slug:ev.slug,quantity:String(state.qty),total:String(plan.total),funnel_step:'checkout_data_submitted'},'/funnel/checkout-data-submitted/'+ev.slug);
    track('Stripe Checkout Opened: '+trackName,{event_name:trackName,event_slug:ev.slug,quantity:String(state.qty),total:String(plan.total),funnel_step:'stripe_checkout_opened'},'/funnel/stripe-opened/'+ev.slug);
    var submitBtn=formEl.querySelector('button[type="submit"]');
    if(submitBtn)submitBtn.disabled=true;
    startStripeCheckout(ev,payload).catch(function(error){
      track('Stripe Checkout Error: '+cleanLabel(ev.plausibleEventName||ev.name),{event_name:cleanLabel(ev.plausibleEventName||ev.name),event_slug:ev.slug,message:String(error&&error.message||error),funnel_step:'stripe_checkout_error'},'/funnel/stripe-error/'+ev.slug);
      if(err){err.textContent=String(error&&error.message||'Stripe Checkout konnte nicht gestartet werden.');err.classList.add('is-visible');}
      if(submitBtn)submitBtn.disabled=false;
    });
  })
}

function startStripeCheckout(ev,payload){
  return fetch('/api/create-checkout-session',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(payload)})
    .then(function(res){return res.json().catch(function(){return {}}).then(function(data){if(!res.ok)throw new Error(data.error||'Stripe Checkout konnte nicht erstellt werden.');return data;});})
    .then(function(data){if(!data.url)throw new Error('Stripe Checkout URL fehlt.');window.location.href=data.url;})
    .catch(function(apiError){
      if(ev.stripePaymentLink){
        var link=new URL(ev.stripePaymentLink,window.location.href);
        link.searchParams.set('prefilled_email',payload.email);
        link.searchParams.set('client_reference_id',payload.clientReference);
        link.searchParams.set('utm_source','vereint_website');
        link.searchParams.set('utm_medium','checkout');
        link.searchParams.set('utm_campaign',ev.slug);
        window.location.href=link.toString();
        return;
      }
      if(stripe&&ev.stripePriceId){
        return stripe.redirectToCheckout({
          lineItems:[{price:ev.stripePriceId,quantity:payload.quantity}],
          mode:'payment',
          customerEmail:payload.email,
          clientReferenceId:payload.clientReference,
          successUrl:window.location.origin+window.location.pathname.replace(/checkout\.html$/,'')+'checkout.html?event='+encodeURIComponent(ev.slug)+'&status=success',
          cancelUrl:window.location.href
        }).then(function(result){if(result&&result.error)throw result.error;});
      }
      throw apiError;
    });
}

function updateSummary(){var ev=state.event;if(!ev)return;var plan=pricePlan(ev,state.qty);var low=ev.availableTickets>0&&ev.availableTickets<5;var earlyLine=plan.early>0?'<div class="price-line"><span>Early Bird</span><span>'+plan.early+' × '+euro(ev.earlyBirdPrice)+'<span class="price-detail">statt '+euro(ev.price)+' / '+escapeHtml(ev.unit)+'</span></span></div>':'';var normalLine=plan.normal>0?'<div class="price-line"><span>Normalpreis</span><span>'+plan.normal+' × '+euro(ev.price)+'<span class="price-detail">/ '+escapeHtml(ev.unit)+'</span></span></div>':'';document.getElementById('checkoutSummary').innerHTML='<p class="eyebrow">Checkout</p><h2 class="form-title">Zusammenfassung</h2><div class="availability '+(low?'low':'')+'">'+(ev.availableTickets>0?(low?'davon nur noch ':'noch ')+ev.availableTickets+' Tickets verfügbar':'ausverkauft')+(isEarly(ev)?'<span class="early-count">davon '+ev.earlyBirdAvailable+' Early Bird · '+euro(ev.earlyBirdPrice)+' statt '+euro(ev.price)+'</span>':'')+'</div><div class="summary-card"><div class="price-line"><span>Auswahl</span><span>'+state.qty+' '+unitLabel(ev,state.qty)+'</span></div>'+earlyLine+normalLine+(plan.saving>0?'<div class="save-note">Du sparst '+euro(plan.saving)+' gegenüber Normalpreis</div>':'')+'<div class="price-line total"><span>Summe</span><span>'+euro(plan.total)+'</span></div></div>'}
function showSuccessModal(name,slug){var modal=document.getElementById('successModal');var text=document.getElementById('successText');var again=document.getElementById('buyAgainLink');var eventName=state.event?state.event.name:(name||'dem Event');if(text){text.innerHTML='Deine Zahlung war erfolgreich. Wir freuen uns riesig und sehen uns beim <strong>'+escapeHtml(eventName)+'</strong>. Alles Weitere bekommst Du per Mail und WhatsApp.';}if(again){again.href='checkout.html?event='+encodeURIComponent(slug||state.event&&state.event.slug||'');}if(modal){modal.classList.remove('is-hidden');document.body.style.overflow='hidden';}}
function handleReturnStatus(){var status=qs('status');if(!status)return;var slug=qs('event')||'';var name=state.event?cleanLabel(state.event.plausibleEventName||state.event.name):slug;if(status==='success'){var sessionId=qs('session_id')||'';fetch('/api/verify-checkout-session?session_id='+encodeURIComponent(sessionId),{cache:'no-store',headers:{'Accept':'application/json'}}).then(function(r){return r.json().catch(function(){return {}})}).then(function(data){if(!data||!data.paid)return;track('Ticket Purchased: '+name,{event_name:name,event_slug:slug,funnel_step:'ticket_purchased_return',session_id:sessionId},'/funnel/ticket-purchased/'+slug);try{sessionStorage.removeItem('vereint_pending_checkout')}catch(err){}mergeInventory(state.event,{bookedTickets:data.bookedTickets,earlyBirdBooked:data.earlyBirdBooked});render();showSuccessModal(name,slug);}).catch(function(){})}if(status==='cancelled'){track('Stripe Checkout Cancelled: '+name,{event_name:name,event_slug:slug,funnel_step:'stripe_cancelled'},'/funnel/stripe-cancelled/'+slug);}}
function trackCheckoutView(){if(!state.event)return;var name=cleanLabel(state.event.plausibleEventName||state.event.name);track('Checkout Viewed: '+name,{event_name:name,event_slug:state.event.slug,funnel_step:'checkout_viewed'},'/funnel/checkout-viewed/'+state.event.slug)}function loadEvent(){var slug=qs('event');if(!slug){render();return}function finish(ev){state.event=ev;trackCheckoutView();render();handleReturnStatus()}function fromFallback(){var found=embeddedEventData.find(function(e){return e.slug===slug});var ev=found?normaliseEvent(found,found.slug):null;fetchInventory(slug).then(function(inv){finish(mergeInventory(ev,inv))})}if(!window.fetch){fromFallback();return}fetch('events/'+encodeURIComponent(slug)+'/event.json',{cache:'no-store'}).then(function(r){if(!r.ok)throw new Error('not found');return r.json()}).then(function(data){var ev=normaliseEvent(data,slug);return fetchInventory(slug).then(function(inv){finish(mergeInventory(ev,inv))})}).catch(fromFallback)}
loadEvent();
</script>
